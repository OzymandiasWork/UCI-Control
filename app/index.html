<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
    <meta name="theme-color" content="#FAF9F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="UCI Control" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>UCI Control — HUAP Torre Valech</title>
    <script>
      // Aplica el tema ANTES del primer paint para evitar el flash claro→oscuro.
      // Misma lógica que useTheme.ts (clave 'uci-theme'; default: el sistema).
      try {
        var t = localStorage.getItem('uci-theme')
        if (t !== 'dark' && t !== 'light')
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        document.documentElement.dataset.theme = t
        if (t === 'dark')
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0d1117')
      } catch (e) { /* sin localStorage (modo privado antiguo): queda el claro */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
